name: AI Orchestrator CI/CD

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  schedule:
    # 每天凌晨2点运行测试
    - cron: '0 2 * * *'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/ai-orchestrator
  KUBE_NAMESPACE: ai-orchestrator-${{ github.ref_name == 'main' && 'prod' || 'staging' }}

jobs:
  # 代码质量检查
  lint-and-format:
    name: Lint and Format
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black flake8 isort mypy pylint bandit
        
    - name: Check code formatting with Black
      run: |
        black --check --diff src/ tests/
        
    - name: Lint with Flake8
      run: |
        flake8 src/ tests/ --max-line-length=120 --statistics
        
    - name: Check imports with isort
      run: |
        isort --check-only --diff src/ tests/
        
    - name: Type checking with mypy
      run: |
        mypy src/ --ignore-missing-imports
        
    - name: Security scan with Bandit
      run: |
        bandit -r src/ -f json -o bandit-report.json || true
        
  # 单元测试
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-format
    
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        pip install pytest pytest-asyncio pytest-cov pytest-xdist
        
    - name: Run unit tests
      run: |
        pytest tests/ -v --cov=src --cov-report=xml --cov-report=html --junitxml=junit.xml -n auto
        
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.python-version }}
        path: |
          junit.xml
          htmlcov/
          
  # 集成测试
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
          
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        pip install pytest pytest-asyncio redis psycopg2-binary
        
    - name: Run integration tests
      env:
        REDIS_URL: redis://localhost:6379/0
        POSTGRES_URL: postgresql://postgres:test_password@localhost:5432/test_db
      run: |
        pytest tests/integration/ -v --tb=short
        
    - name: Upload integration test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: integration-test-results
        path: |
          test-reports/
          
  # 构建和推送Docker镜像
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    
    permissions:
      contents: read
      packages: write
      
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
          
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: Scan image for vulnerabilities
      if: github.event_name != 'pull_request'
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: Upload vulnerability scan results
      if: github.event_name != 'pull_request'
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'
        
  # 部署到Kubernetes
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
      url: ${{ github.ref_name == 'main' && 'https://api.ai-system.com' || 'https://staging.api.ai-system.com' }}
      
    permissions:
      contents: read
      packages: write
      id-token: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Kubernetes tools
      run: |
        # 安装kubectl
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/
        
        # 安装helm
        curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
        chmod 700 get_helm.sh
        ./get_helm.sh
        
    - name: Configure Kubernetes
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'
        
    - name: Authenticate to Kubernetes
      run: |
        # 这里应该使用实际的Kubernetes认证方式
        echo "${{ secrets.KUBECONFIG_PROD }}" > $HOME/.kube/config
        kubectl config use-context ${{ secrets.KUBE_CONTEXT }}
        
    - name: Deploy to Kubernetes
      run: |
        # 更新镜像标签
        export IMAGE_TAG=${{ needs.build-and-push.outputs.image-tag }}
        
        # 部署配置
        kubectl apply -f k8s/namespace.yaml
        kubectl apply -f k8s/configmap-${{ github.ref_name == 'main' && 'prod' || 'staging' }}.yaml
        kubectl apply -f k8s/secrets.yaml
        
        # 部署应用
        envsubst < k8s/deployment.yaml | kubectl apply -f -
        kubectl apply -f k8s/service.yaml
        kubectl apply -f k8s/ingress.yaml
        
        # 等待部署完成
        kubectl rollout status deployment/ai-orchestrator -n ${{ env.KUBE_NAMESPACE }} --timeout=300s
        
    - name: Run smoke tests
      run: |
        # 等待服务就绪
        sleep 30
        
        # 运行冒烟测试
        curl -f https://${{ github.ref_name == 'main' && 'api.ai-system.com' || 'staging.api.ai-system.com' }}/health || exit 1
        
    - name: Notify deployment
      if: success()
      run: |
        # 发送部署成功通知
        curl -X POST -H 'Content-Type: application/json' \
          -d '{"text": "✅ AI编排系统部署成功\n环境: ${{ github.ref_name == 'main' && '生产' || '预发布' }}\n版本: ${{ needs.build-and-push.outputs.image-tag }}\n提交: ${{ github.sha }}\n链接: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
          ${{ secrets.SLACK_WEBHOOK_URL }}
          
    - name: Rollback on failure
      if: failure()
      run: |
        # 部署失败时回滚
        kubectl rollout undo deployment/ai-orchestrator -n ${{ env.KUBE_NAMESPACE }}
        
        # 发送失败通知
        curl -X POST -H 'Content-Type: application/json' \
          -d '{"text": "❌ AI编排系统部署失败\n环境: ${{ github.ref_name == 'main' && '生产' || '预发布' }}\n版本: ${{ needs.build-and-push.outputs.image-tag }}\n提交: ${{ github.sha }}\n错误: 已自动回滚\n链接: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
          ${{ secrets.SLACK_WEBHOOK_URL }}
          
  # 性能测试
  performance-test:
    name: Performance Test
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install locust pandas numpy
        
    - name: Run performance tests
      env:
        API_URL: https://api.ai-system.com/v1
        API_KEY: ${{ secrets.PERF_TEST_API_KEY }}
      run: |
        # 运行负载测试
        locust -f tests/performance/locustfile.py \
          --headless \
          --users 100 \
          --spawn-rate 10 \
          --run-time 5m \
          --host $API_URL \
          --csv=performance-results
        
    - name: Upload performance results
      uses: actions/upload-artifact@v4
      with:
        name: performance-results
        path: |
          performance-results_*.csv
          
    - name: Check performance thresholds
      run: |
        # 检查性能指标是否达标
        python tests/performance/check_metrics.py
        
  # 安全扫描
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run SAST scan
      uses: github/codeql-action/analyze@v2
      with:
        languages: python
        queries: security-extended
        
    - name: Run dependency scan
      uses: snyk/actions/python@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high
        
    - name: Run secret scanning
      uses: gitleaks/gitleaks-action@v2
      with:
        config-path: .gitleaks.toml
        
  # 文档生成
  generate-docs:
    name: Generate Documentation
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mkdocs mkdocs-material pymdown-extensions
        
    - name: Generate API documentation
      run: |
        python scripts/generate_api_docs.py
        
    - name: Build documentation site
      run: |
        mkdocs build --site-dir docs-site
        
    - name: Deploy documentation
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs-site
        destination_dir: docs
        keep_files: false