version: '3.8'

services:
  backend:
    image: python:3.12-slim  # Note: Python 3.13 not available in slim yet
    working_dir: /app
    volumes:
      - ./backend:/app
      - /opt/arkclaw/tools:/app/mcp_tools:ro  # 【绝对核心】宿主机6大原生工具挂载
      - /var/run/docker.sock:/var/run/docker.sock  # 允许AI执行容器操作
    environment:
      - PYTHONPATH=/app
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    ports:
      - "8000:8000"
    command: >
      sh -c "pip install fastapi uvicorn pydantic -q && 
             chmod +x /app/mcp_tools/*/main.py /app/mcp_tools/*/*.py 2>/dev/null || true &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    environment:
      - NEXT_TELEMETRY_DISABLED=1
    ports:
      - "3000:3000"
    command: >
      sh -c "npm install next@15 react@19 react-dom@19 -q 2>/dev/null || true &&
             npm install -g npx -q 2>/dev/null || true &&
             npx next dev --port 3000"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: val-v61-network
