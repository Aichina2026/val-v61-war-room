# 智能系统资源管理器 Agent 配置

# 监控配置
monitoring:
  enabled: true
  interval_seconds: 5  # 采集间隔
  history_size: 1000    # 历史数据保留数量
  
# 异常检测阈值
thresholds:
  cpu:
    warning: 70
    critical: 90
    
  memory:
    warning: 80
    critical: 90
    
  disk:
    warning: 80
    critical: 95
    
  network:
    high_utilization_threshold: 80
    high_error_threshold: 10
    
# Redis 配置
redis:
  host: "localhost"
  port: 6379
  db: 0
  password: null  # 如果需要密码
  decode_responses: true
  max_connections: 10
  
# 资源优化策略
optimization:
  enabled: true
  # CPU 优化
  cpu:
    high_utilization_threshold: 85
    process_termination_threshold: 50
    
  # 内存优化
  memory:
    high_usage_threshold: 85
    cache_clear_threshold: 90
    
  # 磁盘优化
  disk:
    low_space_threshold: 85
    cleanup_file_patterns:
      - "*.tmp"
      - "*.log"
      - "/tmp/*"
    cache_paths:
      - "/var/cache"
      - "~/.cache"
      
# 进程管理
process_management:
  enabled: true
  check_interval_seconds: 30
  critical_processes:
    - "sshd"
    - "systemd"
    - "openclaw-gateway"
    
# 告警配置
alerting:
  enabled: true
  
  # 告警级别定义
  levels:
    warning:
      color: "yellow"
      icon: "⚠️"
    critical:
      color: "red"
      icon: "🚨"
      
  # 告警通知

  notifications:
    - type: "log"
      enabled: true
    - type: "console"
      enabled: true
      
# 数据保留策略
data_retention:
  metrics:
    days: 30  # 指标数据保留天数
  logs:
    days: 90  # 日志数据保留天数
  audit:
    days: 365 # 审计数据保留天数
    
# 性能配置
performance:
  max_workers: 4
  cache_size_mb: 100
  parallel_collectors: 2
  
# 安全配置
security:
  enable_authentication: false
  enable_authorization: false
  allowed_ips:
    - "127.0.0.1"
    - "::1"
    
# 日志配置
logging:
  level: "INFO"
  file: "/var/log/resource_manager_agent.log"
  max_size_mb: 10
  backup_count: 5
  
# 健康检查配置
health_check:
  interval_seconds: 30
  timeout_seconds: 10
  critical_threshold: 5  # 连续失败次数
  
# 网络配置
network:
  listen_host: "0.0.0.0"
  listen_port: 8001
  max_clients: 100
  timeout_seconds: 30
  
# 进程监控

process_monitoring:
  enabled: true
  high_cpu_threshold: 50
  high_memory_threshold: 80
  zombie_check_interval: 60
  
# 定时任务
scheduled_tasks:
  - name: "system_cleanup"
    schedule: "0 2 * * *"  # 每天凌晨2点
    action: "clean_temp_files"
    enabled: true
    
  - name: "performance_report"
    schedule: "0 9 * * *"   # 每天上午9点
    action: "generate_report"
    enabled: true
    
# 数据采集频率
collection_frequency:
  high_load: 2  # 高负载时2秒采集一次
  normal_load: 5  # 正常负载时5秒采集一次
  low_load: 10 # 低负载时10秒采集一次
  
# 告警抑制

alert_suppression:
  enabled: true
  min_interval_minutes: 5  # 相同告警最小间隔
  max_alerts_per_hour: 10  # 每小时最大告警数
  
# 历史数据保留

history_retention:
  metrics_days: 30
  logs_days: 90
  audit_days: 365
  
# 资源限制

resource_limits:
  max_memory_mb: 1024
  max_cpu_percent: 80
  max_network_mb_per_sec: 100
  
# 容错配置

fault_tolerance:
  enabled: true
  max_retries: 3
  retry_delay_seconds: 2
  circuit_breaker_threshold: 5
  
# 监控频率自适应

adaptive_monitoring:
  enabled: true
  high_load_threshold: 70
  high_load_frequency: 2
  normal_load_frequency: 5
  low_load_frequency: 10
  
# 调试配置

debug:
  enabled: false
  verbose_logging: false
  trace_calls: false
  
# 集成配置

integrations:
  openclaw:
    enabled: true
    api_endpoint: "http://localhost:18789"
    monitoring_interval: 5
     
     # 第三方监控系统

  prometheus:
    enabled: true
    port: 9090
    scrape_interval: 15s
    
  grafana:
    enabled: true
    dashboard_path: "/var/lib/grafana/dashboards"
    
  # 云平台集成

  cloud:
    aws:
      enabled: false
      region: "us-east-1"
    azure:
      enabled: false
      resource_group: "default"
      
# 自定义指标

custom_metrics:
  - name: "system_load_index"
    formula: "(load_average_1m / cpu_count) * 100"
    description: "系统负载指数"
    
  - name: "resource_efficiency"
    formula: "(cpu_utilization + memory_utilization + disk_usage) / 3"
    description: "资源使用效率"
    
# 自适应阈值

adaptive_thresholds:
  enabled: true
  learning_window: 720  # 12小时窗口（以数据点为单位）
  adjustment_rate: 0.1  # 调整速率
  min_threshold_adjustment: 5  # 最小阈值调整幅度